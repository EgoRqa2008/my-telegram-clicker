<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            text-align: center; background: #000; color: white; 
            font-family: sans-serif; display: flex; flex-direction: column;
            justify-content: center; height: 100vh; margin: 0; user-select: none;
        }
        #character { width: 200px; transition: transform 0.05s; cursor: pointer; }
        #character:active { transform: scale(0.9); }
        .stats { font-size: 24px; margin: 10px; color: #f1c40f; }
    </style>
</head>
<body>
    <div class="stats">Монет: <span id="count">0</span></div>
    <img id="character" src="https://img.icons8.com/color/300/wrench.png">

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let clicks = 0;
        const user_id = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 0;
        
        // СЮДА НУЖНО БУДЕТ ВСТАВИТЬ ССЫЛКУ ОТ NGROK
        const SERVER_URL = "https://4c05cb0049193c.lhr.life/add_click";
    

        const charImg = document.getElementById('character');
        const countDisplay = document.getElementById('count');

        charImg.onclick = async () => {
            clicks++;
            countDisplay.innerText = clicks;

            // Отправляем данные на сервер бота в Pydroid
            try {
                await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: user_id, amount: 1 })
                });
            } catch (e) {
                console.log("Ошибка отправки клика (сервер пока недоступен)");
            }
            
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        };
    </script>
</body>
</html>
